<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradAccent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#999;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#666;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#gradBg2)"/>
  
  <!-- Shopping Mall/Store Layout -->
  <text x="20" y="25" font-family="monospace" font-size="12" fill="#fff" opacity="0.8">E-Commerce Marketplace</text>
  
  <!-- Product Cards -->
  <rect x="20" y="40" width="35" height="50" fill="rgba(150,150,150,0.1)" stroke="rgba(150,150,150,0.3)" stroke-width="1" rx="4"/>
  <circle cx="37.5" cy="60" r="8" fill="rgba(150,150,150,0.4)"/>
  <text x="23" y="100" font-family="monospace" font-size="8" fill="#aaa">$99.99</text>
  
  <rect x="65" y="40" width="35" height="50" fill="rgba(150,150,150,0.1)" stroke="rgba(150,150,150,0.3)" stroke-width="1" rx="4"/>
  <circle cx="82.5" cy="60" r="8" fill="rgba(150,150,150,0.4)"/>
  <text x="68" y="100" font-family="monospace" font-size="8" fill="#aaa">$149.99</text>
  
  <rect x="110" y="40" width="35" height="50" fill="rgba(150,150,150,0.1)" stroke="rgba(150,150,150,0.3)" stroke-width="1" rx="4"/>
  <circle cx="127.5" cy="60" r="8" fill="rgba(150,150,150,0.4)"/>
  <text x="113" y="100" font-family="monospace" font-size="8" fill="#aaa">$199.99</text>
  
  <!-- Payment Section -->
  <rect x="160" y="40" width="80" height="60" fill="rgba(100,200,100,0.05)" stroke="rgba(100,200,100,0.3)" stroke-width="1.5" rx="6"/>
  <text x="170" y="58" font-family="monospace" font-size="10" fill="#4dffb4" font-weight="bold">Stripe Payment</text>
  <text x="170" y="73" font-family="monospace" font-size="9" fill="#fff" opacity="0.7">99.8% Success</text>
  <text x="170" y="88" font-family="monospace" font-size="9" fill="#fff" opacity="0.6">$2M+ Processed</text>
  
  <!-- Inventory/Orders -->
  <rect x="250" y="40" width="130" height="60" fill="rgba(200,200,200,0.03)" stroke="rgba(200,200,200,0.2)" stroke-width="1" rx="6"/>
  <text x="260" y="58" font-family="monospace" font-size="9" fill="#fff" opacity="0.9">Inventory: 1,250</text>
  <text x="260" y="73" font-family="monospace" font-size="9" fill="#fff" opacity="0.8">Orders: 892 Active</text>
  <text x="260" y="88" font-family="monospace" font-size="9" fill="#fff" opacity="0.7">Fulfillment: 98%</text>
  <text x="260" y="103" font-family="monospace" font-size="8" fill="#fff" opacity="0.5">Real-time Sync</text>
  
  <!-- Statistics -->
  <line x1="20" y1="120" x2="380" y2="120" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="20" y="145" font-family="monospace" font-size="9" fill="#aaa">Multi-vendor</text>
  <text x="120" y="145" font-family="monospace" font-size="9" fill="#aaa">Fraud Detection</text>
  <text x="260" y="145" font-family="monospace" font-size="9" fill="#aaa">PayPal + Crypto</text>
  
  <!-- Featured Badge -->
  <rect x="20" y="155" width="90" height="30" fill="rgba(200,200,200,0.05)" stroke="rgba(200,200,200,0.2)" stroke-width="1" rx="4"/>
  <text x="30" y="175" font-family="monospace" font-size="10" fill="#fff">5000+ Merchants</text>
</svg>